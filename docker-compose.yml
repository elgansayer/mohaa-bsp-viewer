services:
  mohaa-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: mohaa-viewer:local
    container_name: mohaa-viewer
    restart: unless-stopped
    environment:
      PK3_BASE_URL: ${PK3_BASE_URL:-https://cdn.moh-central.net/main}
    ports:
      - "${PORT:-8080}:8080"
