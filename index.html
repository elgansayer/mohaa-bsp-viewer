<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOHAA Map Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            font-size: 13px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        #file-input-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            background: rgba(20, 25, 30, 0.95);
            padding: 24px;
            border-radius: 10px;
            color: #ddd;
            border: 1px solid #444;
            min-width: 340px;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #file-input-container h3 {
            margin-bottom: 12px;
            color: #fff;
            font-size: 18px;
            text-align: center;
        }

        #file-input-container select {
            width: 100%;
            padding: 8px;
            background: #2a2f35;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 13px;
        }

        #file-input-container button {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #2a6db5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }

        #file-input-container button:hover {
            background: #3a8de5;
        }

        #file-input-container input[type="file"] {
            margin-top: 10px;
            color: #aaa;
        }

        .version-info {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #333;
            font-size: 10px;
            color: #666;
            text-align: center;
        }

        canvas {
            display: block;
        }
    </style>
</head>


<body>
    <div id="ui">
        <div id="status">Loading...</div>
    </div>
    <div id="file-input-container">
        <h3>MOHAA Map Viewer</h3>
        <div id="load-progress" style="color:#888; font-size:12px;">Loading PK3 files...</div>
        <div class="version-info">
            BSP viewer with submodels, PVS, terrain, static models, skybox, shaders
        </div>
    </div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
